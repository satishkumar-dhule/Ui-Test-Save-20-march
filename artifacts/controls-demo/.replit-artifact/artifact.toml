kind = "web"
previewPath = "/"
title = "UI Controls Demo"
version = "1.0.0"
id = "artifacts/controls-demo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22588

[services.development]
run = "pnpm --filter @workspace/controls-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/controls-demo", "run", "build" ]
publicDir = "artifacts/controls-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22588"
BASE_PATH = "/"

<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0e0e0e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f4f6" media="(prefers-color-scheme: light)" />
    <meta
      name="description"
      content="Master your tech interviews with AI-powered practice questions, flashcards, mock exams, and more."
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DevPrep" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-touch-fullscreen" content="yes" />
    <title>DevPrep — Architect Elite</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- DNS Prefetch for API endpoints and external resources -->
    <link rel="dns-prefetch" href="http://localhost:3001" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="http://localhost:3001" crossorigin />
    
    <!-- Preload critical fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&display=swap" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" crossorigin />
    
    <!-- Load fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap&subset=latin&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Critical CSS - Inlined for immediate render */
      /* Target: < 50ms First Contentful Paint */
      :root {
        --dp-bg-0: #010409;
        --dp-bg-1: #0d1117;
        --dp-bg-2: #161b22;
        --dp-bg-3: #21262d;
        --dp-glass-0: rgba(13, 17, 23, 0.92);
        --dp-text-0: #e6edf3;
        --dp-text-1: #c9d1d9;
        --dp-text-2: #8b949e;
        --dp-text-3: #484f58;
        --dp-border-0: rgba(48, 54, 61, 0.6);
        --dp-border-1: rgba(48, 54, 61, 0.4);
        --dp-blue: #388bfd;
        --dp-blue-muted: rgba(56, 139, 253, 0.15);
        --dp-sidebar-width: 256px;
        --dp-r-sm: 6px;
        --dp-r-md: 10px;
      }
      :root[data-theme='light'] {
        --dp-bg-0: #f6f8fa;
        --dp-bg-1: #fff;
        --dp-bg-2: #f0f2f5;
        --dp-bg-3: #e8ebef;
        --dp-glass-0: rgba(255, 255, 255, 0.92);
        --dp-text-0: #1f2328;
        --dp-text-1: #24292f;
        --dp-text-2: #57606a;
        --dp-text-3: #8c959f;
        --dp-border-0: rgba(208, 215, 222, 0.8);
        --dp-border-1: rgba(208, 215, 222, 0.5);
        --dp-blue: #0969da;
        --dp-blue-muted: rgba(9, 105, 218, 0.08);
      }
      * {
        box-sizing: border-box;
      }
      html {
        height: 100%;
        -webkit-font-smoothing: antialiased;
      }
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: var(--dp-bg-0);
        color: var(--dp-text-0);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
      .app-root {
        display: flex;
        height: 100dvh;
        height: 100svh;
        width: 100vw;
        overflow: hidden;
        background: var(--dp-bg-0);
        color: var(--dp-text-0);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        position: relative;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      .app-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        overflow: hidden;
        position: relative;
        z-index: 1;
      }
      .sidebar {
        width: var(--dp-sidebar-width);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        background: var(--dp-bg-1);
        border-right: 1px solid var(--dp-border-0);
        overflow: hidden;
        position: relative;
        z-index: 10;
      }
      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          inset-y: 0;
          left: 0;
          z-index: 50;
          transform: translateX(-100%);
          box-shadow: 4px 0 40px rgba(0, 0, 0, 0.5);
        }
        .sidebar--mobile-open {
          transform: translateX(0);
        }
      }
      .sidebar-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 16px 16px 12px;
        border-bottom: 1px solid var(--dp-border-1);
        flex-shrink: 0;
      }
      .sidebar-logo-icon {
        width: 32px;
        height: 32px;
        border-radius: var(--dp-r-md);
        background: linear-gradient(135deg, var(--dp-blue), #6e40c9);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        flex-shrink: 0;
      }
      .sidebar-logo-title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.3px;
        color: var(--dp-text-0);
      }
      .sidebar-logo-sub {
        font-size: 11px;
        color: var(--dp-text-2);
      }
      .sidebar-section {
        flex-shrink: 0;
        padding: 4px 0;
        overflow-y: auto;
      }
      .sidebar-channels {
        overflow-y: auto;
        max-height: 40vh;
        padding: 2px 8px;
      }
      .sidebar-channel {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 8px;
        border-radius: var(--dp-r-sm);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--dp-text-1);
        font-size: 13px;
        text-align: left;
        position: relative;
        min-height: 44px;
        box-sizing: border-box;
      }
      .sidebar-channel:hover {
        background: var(--dp-bg-3);
        color: var(--dp-text-0);
      }
      .sidebar-channel--active {
        background: var(--dp-blue-muted);
        color: var(--dp-text-0);
      }
      .sidebar-sec {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 10px 12px;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--dp-text-1);
        font-size: 13px;
        text-align: left;
        border-radius: var(--dp-r-sm);
        margin: 1px 8px;
        min-height: 44px;
        box-sizing: border-box;
      }
      .sidebar-sec:hover {
        background: var(--dp-bg-3);
      }
      .sidebar-sec--active {
        background: var(--dp-blue-muted);
        color: var(--dp-text-0);
      }
      .sidebar-sec-label {
        flex: 1;
      }
      .sidebar-sec-count {
        font-size: 11px;
        color: var(--dp-text-2);
        background: var(--dp-bg-3);
        padding: 2px 6px;
        border-radius: 10px;
      }
      .loading-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(1, 4, 9, 0.6);
        z-index: 50;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 2px solid var(--dp-border-0);
        border-top-color: var(--dp-blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .skip-link:focus {
        position: absolute;
        top: 16px;
        left: 16px;
        z-index: 100;
        padding: 8px 16px;
        background: var(--dp-blue);
        color: #fff;
        border-radius: var(--dp-r-sm);
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        clip: auto;
        width: auto;
        height: auto;
        overflow: visible;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link sr-only focus:not-sr-only"> Skip to main content </a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Full CSS loaded asynchronously after critical styles -->
    <link
      rel="stylesheet"
      href="/src/styles/critical.css"
      media="print"
      onload="this.media = 'all'"
      crossorigin
    />
    <noscript><link rel="stylesheet" href="/src/styles/critical.css" /></noscript>
  </body>
</html>

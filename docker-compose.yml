version: '3.9'

services:
  # API Server
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: devprep-api
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-}
      # SQLite path (for development without PostgreSQL)
      - SQLITE_PATH=/app/data/devprep.db
    volumes:
      # Mount data directory for SQLite persistence
      - api-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - devprep-network

  # Frontend (for development with hot reload)
  frontend-dev:
    build:
      context: .
      dockerfile: artifacts/devprep/Dockerfile.dev
    container_name: devprep-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - BASE_PATH=/
      - VITE_API_URL=http://localhost:4000
    volumes:
      - ./artifacts/devprep:/app/artifacts/devprep
      - ./lib:/app/lib
      - /app/artifacts/devprep/node_modules
    depends_on:
      - api
    networks:
      - devprep-network

  # Frontend (production build)
  frontend:
    build:
      context: .
      dockerfile: artifacts/devprep/Dockerfile
      args:
        - BASE_PATH=/
    container_name: devprep-frontend
    restart: unless-stopped
    ports:
      - "8080:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - devprep-network

  # PostgreSQL Database (optional, for production)
  postgres:
    image: postgres:16-alpine
    container_name: devprep-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-devprep}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devprep}
      - POSTGRES_DB=${POSTGRES_DB:-devprep}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devprep}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devprep-network
    profiles:
      - with-db

  # Nginx reverse proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: devprep-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - frontend
      - api
    networks:
      - devprep-network
    profiles:
      - with-proxy

volumes:
  api-data:
    driver: local
  postgres-data:
    driver: local
  nginx-logs:
    driver: local

networks:
  devprep-network:
    driver: bridge
